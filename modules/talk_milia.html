<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Milia - Ask Me Anything</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #1a1e2c;
            font-family: system-ui, 'Segoe UI', sans-serif;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .game-container {
            width: 100%;
            max-width: 500px;
            height: 100vh;
            background-color: #2a2f3f;
            position: relative;
            overflow: hidden;
        }
        .bg-layer {
            position: absolute;
            width: 100%;
            height: 100%;
            background-image: url('../assets/bg_main.png');
            background-size: cover;
            background-position: center;
            z-index: 1;
        }
        .character-layer {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            display: flex;
            justify-content: center;
            z-index: 2;
        }
        .character-layer img {
            max-width: 85%;
            height: 48vh;
            object-fit: contain;
        }
        .chat-container {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(0,0,0,0.9);
            border-radius: 28px 28px 0 0;
            padding: 16px;
            z-index: 3;
            height: 45vh;
            display: flex;
            flex-direction: column;
        }
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            margin-bottom: 12px;
            padding-right: 6px;
        }
        .message {
            margin-bottom: 10px;
            padding: 8px 12px;
            border-radius: 20px;
            max-width: 85%;
            font-size: 0.85rem;
        }
        .message.user {
            background: #6c5ce7;
            color: white;
            align-self: flex-end;
            margin-left: auto;
        }
        .message.milia {
            background: #3a4a5c;
            color: #f0f0f0;
        }
        .input-area {
            display: flex;
            gap: 10px;
            align-items: center;
        }
        .input-area input {
            flex: 1;
            padding: 12px;
            border-radius: 40px;
            border: none;
            background: #2e3a48;
            color: white;
            font-size: 0.85rem;
        }
        .input-area button {
            background: #FFB347;
            border: none;
            padding: 12px 20px;
            border-radius: 40px;
            font-weight: bold;
            cursor: pointer;
        }
        .back-btn {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(0,0,0,0.6);
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 40px;
            z-index: 10;
            cursor: pointer;
            font-size: 0.8rem;
        }
        @media (max-height: 700px) {
            .character-layer img { height: 42vh; }
            .chat-container { height: 40vh; }
        }
    </style>
</head>
<body>
<div class="game-container">
    <div class="bg-layer"></div>
    <div class="character-layer">
        <img src="../assets/milia_normal.png" alt="Milia">
    </div>
    <div class="chat-container">
        <div class="chat-messages" id="chatMessages">
            <div class="message milia">✨ Hi! I'm Milia. Ask me anything about writing a blog post — structure, vocabulary, expressing opinions, or supporting your ideas with reasons.But don't ask anything funny, ok?</div>
        </div>
        <div class="input-area">
            <input type="text" id="userInput" placeholder="Ask Milia a question...">
            <button id="sendBtn">Send</button>
        </div>
    </div>
    <button class="back-btn" onclick="window.location.href='../index.html'">◀ Back</button>
</div>

<script>
    // ⚠️ IMPORTANT: Replace this with your actual Cloudflare Worker URL
    const WORKER_URL = 'https://milia-gemini-proxy.r-arya0882.workers.dev';

    const chatMessages = document.getElementById('chatMessages');
    const userInput = document.getElementById('userInput');
    const sendBtn = document.getElementById('sendBtn');

    function addMessage(sender, text) {
        const msgDiv = document.createElement('div');
        msgDiv.className = `message ${sender}`;
        msgDiv.textContent = text;
        chatMessages.appendChild(msgDiv);
        chatMessages.scrollTop = chatMessages.scrollHeight;
    }

    async function askMilia() {
        const question = userInput.value.trim();
        if (!question) return;

        addMessage('user', question);
        userInput.value = '';

        // Show typing indicator
        const typingDiv = document.createElement('div');
        typingDiv.className = 'message milia';
        typingDiv.textContent = '✍️ Milia is thinking...';
        chatMessages.appendChild(typingDiv);
        chatMessages.scrollTop = chatMessages.scrollHeight;

        try {
            const response = await fetch(WORKER_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ question: question })
            });

            const data = await response.json();
            typingDiv.remove();

            if (data.error) {
                addMessage('milia', `Hmm, I'm having trouble. Error: ${data.error}`);
            } else {
                addMessage('milia', data.reply);
            }
        } catch (error) {
            typingDiv.remove();
            addMessage('milia', 'Connection error. Please try again later.');
            console.error('Fetch error:', error);
        }
    }

    sendBtn.addEventListener('click', askMilia);
    userInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') askMilia();
    });
</script>
</body>
</html>
