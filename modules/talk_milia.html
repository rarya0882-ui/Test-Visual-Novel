<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Milia AI Test</title>
    <style>
        body {
            background: #1a1e2c;
            color: white;
            font-family: system-ui;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .chat-box {
            background: #2a2f3f;
            border-radius: 28px;
            padding: 20px;
            width: 90%;
            max-width: 400px;
        }
        .messages {
            height: 300px;
            overflow-y: auto;
            margin-bottom: 15px;
            background: #1e2434;
            border-radius: 20px;
            padding: 10px;
        }
        .user { color: #aaf; }
        .milia { color: #fda; }
        input, button {
            padding: 10px;
            border-radius: 40px;
            border: none;
        }
        input {
            width: 70%;
            background: #3a4a5c;
            color: white;
        }
        button {
            width: 25%;
            background: #FFB347;
            font-weight: bold;
            cursor: pointer;
        }
    </style>
</head>
<body>
<div class="chat-box">
    <h2>🌸 Talk with Milia (AI)</h2>
    <div class="messages" id="messages"></div>
    <input type="text" id="question" placeholder="Ask about writing a blog...">
    <button id="send">Send</button>
    <br><br>
    <button onclick="window.location.href='../index.html'">◀ Back</button>
</div>

<script>
document.addEventListener('DOMContentLoaded', function() {
    const WORKER_URL = 'https://milia-gemini-proxy.r-arya0882.workers.dev';

    const messagesDiv = document.getElementById('messages');
    const questionInput = document.getElementById('question');
    const sendBtn = document.getElementById('send');

    if (!messagesDiv || !questionInput || !sendBtn) {
        console.error('Required elements not found');
        return;
    }

    function addMessage(sender, text) {
        const msg = document.createElement('div');
        msg.className = sender;
        msg.innerHTML = `<strong>${sender === 'user' ? 'You' : 'Milia'}:</strong> ${text}`;
        messagesDiv.appendChild(msg);
        messagesDiv.scrollTop = messagesDiv.scrollHeight;
    }

    async function askMilia() {
        const question = questionInput.value.trim();
        if (!question) return;

        addMessage('user', question);
        questionInput.value = '';

        addMessage('milia', '✍️ Thinking...');

        try {
            const response = await fetch(WORKER_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ question: question })
            });
            const data = await response.json();

            messagesDiv.removeChild(messagesDiv.lastChild);

            if (data.error) {
                addMessage('milia', `Error: ${data.error}`);
            } else {
                addMessage('milia', data.reply);
            }
        } catch (err) {
            messagesDiv.removeChild(messagesDiv.lastChild);
            addMessage('milia', `Connection error: ${err.message}`);
            console.error(err);
        }
    }

    sendBtn.addEventListener('click', askMilia);
    questionInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') askMilia();
    });
});
</script>
</body>
</html>
