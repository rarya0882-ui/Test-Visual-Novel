<script>
    // Correct Worker URL with https://
    const WORKER_URL = 'https://milia-gemini-proxy.r-arya0882.workers.dev';

    const chatMessages = document.getElementById('chatMessages');
    const userInput = document.getElementById('userInput');
    const sendBtn = document.getElementById('sendBtn');

    function addMessage(sender, text) {
        const msgDiv = document.createElement('div');
        msgDiv.className = `message ${sender}`;
        msgDiv.textContent = text;
        chatMessages.appendChild(msgDiv);
        chatMessages.scrollTop = chatMessages.scrollHeight;
    }

    async function askMilia() {
        const question = userInput.value.trim();
        if (!question) return;

        addMessage('user', question);
        userInput.value = '';

        const typingDiv = document.createElement('div');
        typingDiv.className = 'message milia';
        typingDiv.textContent = '✍️ Milia is thinking...';
        chatMessages.appendChild(typingDiv);
        chatMessages.scrollTop = chatMessages.scrollHeight;

        try {
            // Use WORKER_URL variable (with https://)
            const response = await fetch(WORKER_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ question: question })
            });

            const data = await response.json();
            typingDiv.remove();

            if (data.error) {
                addMessage('milia', `Hmm, I'm having trouble. Error: ${data.error}`);
            } else {
                addMessage('milia', data.reply);
            }
        } catch (error) {
            typingDiv.remove();
            addMessage('milia', 'Connection error. Please try again later.');
            console.error('Fetch error:', error);
        }
    }

    sendBtn.addEventListener('click', askMilia);
    userInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') askMilia();
    });
</script>
